<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Final Api Paises</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">EL MUNDO Y SUS PAISES</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="https://www.worldometers.info/es/poblacion-mundial/poblacion-por-pais/" target="_blank"> 
                            <i class="fas fa-globe-americas me-2"></i>
                            Poblacion
                        </a>
                        </li>
                        <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="https://www.istockphoto.com/es/fotos/banderas-paises" target="_blank"> 
                        <i class="fas fa-flag me-2"></i>
                        Banderas
                    </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="https://www.booking.com/city/gt/guatemala.es.html" target="_blank"> 
                            <i class="fas fa-plane me-2"></i>
                            <span>Vuelos</span>
                        </a>
                        </li>
                    </ul>
                    </div>
                </div>
         </nav>
        </header>
        
        <main class="container">
           <section class="my-5">
                <h1 class="text-center mb-4">Bienvenido al Examen Final de API de Países</h1>
                <p class="text-center">Explora información detallada sobre países de todo el mundo, incluyendo su población, nombre  y capital.</p>
            </section>
            <section id="tabla-paises" class="my-5">
                <h2 class="mb-4">Lista de Países</h2>
                <div class="table-responsive">
                    <input type="text" id="buscador" class="form-control mb-3" placeholder="Busca un país por nombre...">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Nombre del País</th>
                                <th>Capital</th>
                                <th>Región</th>
                                <th>Población</th>
                                <th>Idioma</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla">
                           
                        </tbody>
                    </table>
                </div>
             
            </section>
        </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
